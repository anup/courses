<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ES242(N)</title>
  <link rel="stylesheet" href="../assets/course-theme.css">
</head>
<body>
  <main class="shell">
    <div class="theme-row" aria-label="Theme">
      <div class="theme-switch">
        <button class="theme-choice" type="button" data-theme-choice="grid">Grid</button>
        <button class="theme-choice" type="button" data-theme-choice="dark">Dark</button>
      </div>
    </div>
    <div class="topline">
      <a class="brand" href="../">IITGN Courses</a>
      <nav class="nav" aria-label="Course navigation">
        <a href="../">All Courses</a>
        <a href="../es248/">ES248</a>
        <a href="./" aria-current="page">ES242(N)</a>
      </nav>
    </div>
    <section class="hero">
      <p class="eyebrow">course workspace</p>
      <h1>ES242(N)</h1>
      <p class="lead">Class-wise material and student-facing course workflow.</p>
    </section>
    <section class="grid" aria-label="ES242(N) classes">
      <a class="tile" href="classes/class-01/">
        <strong>Class 1: Introduction + Ubuntu</strong>
        <span>Course logistics, intake, handle collection, assessment discussion, and Ubuntu installation.</span>
      </a>
    </section>
  </main>
  <script>
    (function () {
      var key = "iitgn-course-theme";
      var buttons = document.querySelectorAll("[data-theme-choice]");
      function apply(theme) {
        document.body.dataset.theme = theme;
        buttons.forEach(function (button) {
          button.setAttribute("aria-pressed", button.dataset.themeChoice === theme ? "true" : "false");
        });
      }
      var stored = localStorage.getItem(key);
      apply(stored === "dark" || stored === "light" ? "dark" : "grid");
      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          localStorage.setItem(key, button.dataset.themeChoice);
          apply(button.dataset.themeChoice);
        });
      });
    }());
  </script>
</body>
</html>
