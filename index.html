<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IITGN Courses</title>
  <link rel="stylesheet" href="assets/course-theme.css">
</head>
<body>
  <main class="shell">
    <div class="theme-row" aria-label="Theme">
      <div class="theme-switch">
        <button class="theme-choice" type="button" data-theme-choice="grid">Grid</button>
        <button class="theme-choice" type="button" data-theme-choice="dark">Dark</button>
      </div>
    </div>
    <div class="topline">
      <a class="brand" href="./">IITGN Courses</a>
      <nav class="nav" aria-label="Courses">
        <a href="es248/">ES248</a>
        <a href="es242n/">ES242(N)</a>
      </nav>
    </div>
    <section class="hero">
      <p class="eyebrow">course index</p>
      <h1>IITGN Courses</h1>
      <p class="lead">Published course pages and student-facing course tools.</p>
    </section>
    <section class="grid" aria-label="Course links">
      <a class="tile" href="es248/">
        <strong>ES248</strong>
        <span>Introduction to DSA in C Programming</span>
      </a>
      <a class="tile" href="es242n/">
        <strong>ES242(N)</strong>
        <span>Course material and handle submission for ES242(N)</span>
      </a>
    </section>
  </main>
  <script>
    (function () {
      var key = "iitgn-course-theme";
      var buttons = document.querySelectorAll("[data-theme-choice]");
      function apply(theme) {
        document.body.dataset.theme = theme;
        buttons.forEach(function (button) {
          button.setAttribute("aria-pressed", button.dataset.themeChoice === theme ? "true" : "false");
        });
      }
      var stored = localStorage.getItem(key);
      apply(stored === "dark" || stored === "light" ? "dark" : "grid");
      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          localStorage.setItem(key, button.dataset.themeChoice);
          apply(button.dataset.themeChoice);
        });
      });
    }());
  </script>
</body>
</html>
