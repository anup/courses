<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACM Summer School 2026 Leaderboard</title>
  <style>
    :root {
      --bg: #fbfaf7;
      --ink: #171717;
      --muted: #67635e;
      --line: #d8d3ca;
      --panel: #ffffff;
      --accent: #0b6b57;
      --accent-soft: #e6f2ee;
      --gold: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .top {
      padding: 26px 0 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0;
      line-height: 1.05;
    }
    .subtext, .updated, .note {
      color: var(--muted);
      max-width: 900px;
    }
    .updated {
      margin-top: 8px;
      font-size: 0.92rem;
    }
    main {
      padding: 24px 0 44px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 22px;
    }
    .metric {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.4rem;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button[aria-selected="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .tools {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input {
      width: min(360px, 80vw);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 0.94rem;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      vertical-align: top;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #f3f0ea;
      color: #312f2b;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      z-index: 1;
    }
    td.text, th.text {
      text-align: left;
    }
    tbody tr:hover td {
      background: var(--accent-soft);
    }
    .rank {
      font-weight: 800;
      color: var(--accent);
    }
    .rank-one {
      color: var(--gold);
    }
    .note {
      margin: 18px 0 0;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      font-size: 0.96rem;
    }
    .hidden { display: none; }
    @media (max-width: 760px) {
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .shell { width: min(100vw - 20px, 1240px); }
      th, td { padding: 9px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell top">
      <h1>ACM Summer School 2026 Leaderboard</h1>
      <div class="subtext">Team scores, top individual handles, and team rosters for the workshop contests.</div>
      <div class="updated" id="updated"></div>
    </div>
  </header>
  <main class="shell">
    <section class="summary" id="summary"></section>
    <div class="tabs" role="tablist" aria-label="Leaderboard views">

      <button id="individual-tab" role="tab" aria-selected="false" aria-controls="individual-view" data-view="individual">Top 10 Individuals</button>
      <button id="roster-tab" role="tab" aria-selected="false" aria-controls="roster-view" data-view="roster">Team Roster</button>
      <button id="links-tab" role="tab" aria-selected="false" aria-controls="links-view" data-view="links">Contest Links</button>
    </div>
    <div class="tools">
      <label>Search
        <input id="search" type="search" placeholder="Team or handle">
      </label>
    </div>
    <section id="team-view" role="tabpanel" aria-labelledby="team-tab">
      <div class="table-wrap"><table id="team-table"></table></div>
    </section>
    <section id="individual-view" class="hidden" role="tabpanel" aria-labelledby="individual-tab">
      <div class="table-wrap"><table id="individual-table"></table></div>
    </section>
    <section id="roster-view" class="hidden" role="tabpanel" aria-labelledby="roster-tab">
      <div class="table-wrap"><table id="roster-table"></table></div>
    </section>
    <section id="links-view" class="hidden" role="tabpanel" aria-labelledby="links-tab">
      <div class="table-wrap"><table id="links-table"></table></div>
    </section>
    <p class="note" id="note"></p>
  </main>

    function number(value) {
      return Number(value).toLocaleString("en-IN", { maximumFractionDigits: 2, minimumFractionDigits: Number(value) % 1 ? 2 : 0 });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }

    function renderSummary() {
      const teams = DATA.team_leaderboard.length;
      const handles = DATA.team_roster.reduce((sum, team) => sum + team.handles.length, 0);
      const contestsCount = contests.length;
      const top = DATA.team_leaderboard[0];
      document.getElementById("summary").innerHTML = [
        ["Teams", teams],
        ["Handles", handles],
        ["Scored Contests", contestsCount],
        ["Current Leader", top ? top.team_name : "-"],
      ].map(([label, value]) => `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join("");
    }

    function renderTeamTable() {
      const headers = ["Rank", "Team", "Captain", "Members", "Total"].concat(contests.map(c => c + " /100"));
      const rows = DATA.team_leaderboard
        .filter(row => matches(row.team_name + " " + row.captain))
        .map(row => {
          const cls = row.rank === 1 ? "rank rank-one" : "rank";
          const cells = [
            `<td class="${cls}">${row.rank}</td>`,
            `<td class="text"><strong>${escapeHtml(row.team_name)}</strong></td>`,
            `<td class="text">${escapeHtml(row.captain)}</td>`,
            `<td>${row.members}</td>`,
            `<td><strong>${number(row.normalized_total)}</strong></td>`,
          ];
          contests.forEach(c => {
            const item = row.contests[c];
            cells.push(`<td title="Raw score: ${number(item.raw)}">${number(item.normalized)}</td>`);
          });
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("team-table").innerHTML = tableHtml(headers, rows);
    }

    function renderIndividualTable() {
      const headers = ["Rank", "CodeChef", "Raw Total", "Solved"].concat(contests);
      const rows = DATA.individual_leaderboard
        .filter(row => matches(row.codechef_handle))
        .map(row => {
          const cells = [
            `<td class="rank">${row.rank}</td>`,
            `<td class="text"><strong>${escapeHtml(row.codechef_handle)}</strong></td>`,
            `<td><strong>${number(row.total_raw)}</strong></td>`,
            `<td>${row.total_solved}</td>`,
          ];
          contests.forEach(c => cells.push(`<td>${number(row.scores[c].score)}</td>`));
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("individual-table").innerHTML = tableHtml(headers, rows);
    }

    function renderRosterTable() {
      const headers = ["Team", "Captain", "Member Handles"];
      const rows = DATA.team_roster
        .filter(row => matches(row.team_name + " " + row.captain + " " + row.handles.join(" ")))
        .map(row => {
          const cells = [
            `<td class="text"><strong>${escapeHtml(row.team_name)}</strong></td>`,
            `<td class="text">${escapeHtml(row.captain)}</td>`,
            `<td class="text">${escapeHtml(row.handles.join(", "))}</td>`,
          ];
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("roster-table").innerHTML = tableHtml(headers, rows);
    }

    function renderLinksTable() {
      const headers = ["Type", "Contest", "Link", "Note"];
      const rows = DATA.contest_links
        .filter(row => matches(row.label + " " + row.code + " " + row.note))
        .map(row => {
          const cells = [
            `<td class="text">${escapeHtml(row.label)}</td>`,
            `<td class="text"><strong>${escapeHtml(row.code)}</strong></td>`,
            `<td class="text"><a href="${escapeHtml(row.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(row.url)}</a></td>`,
            `<td class="text">${escapeHtml(row.note)}</td>`,
          ];
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("links-table").innerHTML = tableHtml(headers, rows);
    }

    function tableHtml(headers, rows) {
      const head = `<thead><tr>${headers.map((h, i) => `<th class="${i === 1 ? "text" : ""}">${escapeHtml(h)}</th>`).join("")}</tr></thead>`;
      const body = rows.length ? rows.join("") : `<tr><td colspan="${headers.length}" class="text">No matching rows.</td></tr>`;
      return head + `<tbody>${body}</tbody>`;
    }

    function matches(text) {
      return !query || text.toLowerCase().includes(query);
    }

    function render() {
      renderSummary();
      renderTeamTable();
      renderIndividualTable();
      renderRosterTable();
      renderLinksTable();
      document.getElementById("updated").textContent = "Last updated: " + new Date(DATA.generated_at).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
      document.getElementById("note").textContent = DATA.scoring_note;
    }

    document.getElementById("search").addEventListener("input", event => {
      query = event.target.value.trim().toLowerCase();
      render();
    });

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        currentView = button.dataset.view;
        document.querySelectorAll("[data-view]").forEach(b => b.setAttribute("aria-selected", String(b === button)));
        document.getElementById("team-view").classList.toggle("hidden", currentView !== "team");
        document.getElementById("individual-view").classList.toggle("hidden", currentView !== "individual");
        document.getElementById("roster-view").classList.toggle("hidden", currentView !== "roster");
        document.getElementById("links-view").classList.toggle("hidden", currentView !== "links");
      });
    });

    render();
  </script>
</body>
</html>
