<html lang="en">

    :root {
      --bg: #fbfaf7;

      --muted: #67635e;
      --line: #d8d3ca;
      --panel: #ffffff;
      --accent: #0b6b57;
      --accent-soft: #e6f2ee;
      --gold: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .top {
      padding: 26px 0 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0;
      line-height: 1.05;
    }
    .subtext, .updated, .note {
      color: var(--muted);
      max-width: 900px;
    }
    .updated {
      margin-top: 8px;
      font-size: 0.92rem;
    }
    main {
      padding: 24px 0 44px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 22px;
    }
    .metric {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.4rem;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button[aria-selected="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .tools {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input {
      width: min(360px, 80vw);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }
    .table-wrap {
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 0.82rem;
      table-layout: fixed;
    }
    th, td {
      padding: 7px 5px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      vertical-align: top;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    th {
      position: sticky;
      top: 0;
      background: #f3f0ea;
      color: #312f2b;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.15;
      z-index: 1;
    }
    th button {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      text-align: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      font: inherit;
      cursor: pointer;
    }
    th button:hover {
      color: var(--accent);
    }
    th button .sort-mark {
      color: var(--accent);
      display: block;
      margin-top: 2px;
      font-size: 0.85em;
    }
    .head-line {
      display: block;
    }
    .contest-link {
      display: block;
      margin-top: 3px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: none;
      letter-spacing: 0;
    }
    td.text, th.text {
      text-align: left;
    }
    tbody tr:hover td {
      background: var(--accent-soft);
    }
    .rank {
      font-weight: 800;
      color: var(--accent);
    }
    .rank-one {
      color: var(--gold);
    }
    .note {
      margin: 18px 0 0;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      font-size: 0.96rem;
    }
    .hidden { display: none; }
    @media (max-width: 760px) {
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .shell { width: min(100vw - 20px, 1240px); }
      th, td { padding: 9px 10px; }
    }
  </style>

    const contestInfoByCode = Object.fromEntries(DATA.contests.map((contest, index) => [contest.code, { ...contest, testNumber: index + 1 }]));
    const displayedContests = DATA.contests.map((contest, index) => ({ ...contest, testNumber: index + 1 })).reverse();
    let currentView = "team";
    let query = "";
    const sortState = {
      team: { key: "rank", direction: "asc" },
      individual: { key: "rank", direction: "asc" },
      roster: { key: "team_name", direction: "asc" },
      links: { key: "code", direction: "asc" },
    };

    function number(value) {
      return Number(value).toLocaleString("en-IN", { maximumFractionDigits: 2, minimumFractionDigits: Number(value) % 1 ? 2 : 0 });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }

    function codechefUserLink(handle) {
      const safeHandle = escapeHtml(handle);
      const urlHandle = encodeURIComponent(handle);
      return `<a href="https://www.codechef.com/users/${urlHandle}" target="_blank" rel="noopener noreferrer">${safeHandle}</a>`;
    }

    function compareValues(a, b, direction) {
      const av = a ?? "";
      const bv = b ?? "";
      let result;
      if (typeof av === "number" && typeof bv === "number") {
        result = av - bv;
      } else {
        result = String(av).localeCompare(String(bv), "en", { numeric: true, sensitivity: "base" });
      }
      return direction === "asc" ? result : -result;
    }

    function sortedRows(view, rows, valueForKey) {
      const state = sortState[view];
      return rows.slice().sort((a, b) => {
        const primary = compareValues(valueForKey(a, state.key), valueForKey(b, state.key), state.direction);
        if (primary !== 0) return primary;
        return compareValues(valueForKey(a, "rank") ?? valueForKey(a, "team_name") ?? valueForKey(a, "code"), valueForKey(b, "rank") ?? valueForKey(b, "team_name") ?? valueForKey(b, "code"), "asc");
      });
    }

    function renderSummary() {
      const teams = DATA.team_leaderboard.length;
      const handles = DATA.team_roster.reduce((sum, team) => sum + team.handles.length, 0);
      const contestsCount = contests.length;
      const top = DATA.team_leaderboard[0];
      document.getElementById("summary").innerHTML = [
        ["Teams", teams],
        ["Handles", handles],
        ["Scored Contests", contestsCount],
        ["Current Leader", top ? top.team_name : "-"],
      ].map(([label, value]) => `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join("");
    }

    function renderTeamTable() {
      const headers = [
        { label: "Rank", key: "rank", width: "4%" },
        { label: "Team", key: "team_name", text: true, width: "15%" },
        { label: "Captain", key: "captain", text: true, width: "13%" },
        { label: "Members", key: "members", width: "6%" },
        { label: "Total", key: "normalized_total", width: "8%" },
      ].concat(displayedContests.map(contest => ({ label: `Test ${contest.testNumber} /100`, lines: [`Test ${contest.testNumber}`, "/100"], key: "contest:" + contest.code, url: contest.url, width: "6%" })));
      const rows = DATA.team_leaderboard
        .filter(row => matches(row.team_name + " " + row.captain))
      const sorted = sortedRows("team", rows, (row, key) => key.startsWith("contest:") ? row.contests[key.slice(8)].normalized : row[key]);
      const htmlRows = sorted
        .map(row => {
          const cls = row.rank === 1 ? "rank rank-one" : "rank";
          const cells = [
            `<td class="${cls}">${row.rank}</td>`,
            `<td class="text"><strong>${escapeHtml(row.team_name)}</strong></td>`,
            `<td class="text">${escapeHtml(row.captain)}</td>`,
            `<td>${row.members}</td>`,
            `<td><strong>${number(row.normalized_total)}</strong></td>`,
          ];
          displayedContests.forEach(contest => {
            const item = row.contests[contest.code];
            cells.push(`<td title="Raw score: ${number(item.raw)}">${number(item.normalized)}</td>`);
          });
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("team-table").innerHTML = tableHtml("team", headers, htmlRows);
    }

    function renderIndividualTable() {
      const headers = [
        { label: "Rank", key: "rank", width: "5%" },
        { label: "CodeChef", key: "codechef_handle", text: true, width: "19%" },
        { label: "Raw Total", key: "total_raw", width: "8%" },
        { label: "Solved", key: "total_solved", width: "7%" },
      ].concat(displayedContests.map(contest => ({ label: `Test ${contest.testNumber} raw`, lines: [`Test ${contest.testNumber}`, "raw"], key: "contest:" + contest.code, url: contest.url, width: "6%" })));
      const rows = DATA.individual_leaderboard
        .filter(row => matches(row.codechef_handle))
      const sorted = sortedRows("individual", rows, (row, key) => key.startsWith("contest:") ? row.scores[key.slice(8)].score : row[key]);
      const htmlRows = sorted
        .map(row => {
          const cells = [
            `<td class="rank">${row.rank}</td>`,
            `<td class="text"><strong>${codechefUserLink(row.codechef_handle)}</strong></td>`,
            `<td><strong>${number(row.total_raw)}</strong></td>`,
            `<td>${row.total_solved}</td>`,
          ];
          displayedContests.forEach(contest => cells.push(`<td>${number(row.scores[contest.code].score)}</td>`));
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("individual-table").innerHTML = tableHtml("individual", headers, htmlRows);
    }

    function renderRosterTable() {
      const headers = [
        { label: "Team", key: "team_name", text: true, width: "18%" },
        { label: "Captain", key: "captain", text: true, width: "18%" },
        { label: "Member Handles", key: "handles", text: true, width: "64%" },
      ];
      const rows = DATA.team_roster
        .filter(row => matches(row.team_name + " " + row.captain + " " + row.handles.join(" ")))
      const sorted = sortedRows("roster", rows, (row, key) => key === "handles" ? row.handles.join(" ") : row[key]);
      const htmlRows = sorted
        .map(row => {
          const cells = [
            `<td class="text"><strong>${escapeHtml(row.team_name)}</strong></td>`,
            `<td class="text">${escapeHtml(row.captain)}</td>`,
            `<td class="text">${row.handles.map(codechefUserLink).join(", ")}</td>`,
          ];
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("roster-table").innerHTML = tableHtml("roster", headers, htmlRows);
    }

    function renderLinksTable() {
      const headers = [
        { label: "Type", key: "label", text: true, width: "26%" },
        { label: "Contest", key: "code", text: true, width: "18%" },
        { label: "Link", key: "url", text: true, width: "10%" },
        { label: "Note", key: "note", text: true, width: "46%" },
      ];
      const rows = DATA.contest_links
        .filter(row => matches(row.label + " " + row.code + " " + row.note))
      const sorted = sortedRows("links", rows, (row, key) => row[key]);
      const htmlRows = sorted
        .map(row => {
          const cells = [
            `<td class="text">${escapeHtml(row.label)}</td>`,
            `<td class="text"><strong>${escapeHtml(row.code)}</strong></td>`,
            `<td class="text"><a href="${escapeHtml(row.url)}" target="_blank" rel="noopener noreferrer">Open</a></td>`,
            `<td class="text">${escapeHtml(row.note)}</td>`,
          ];
          return `<tr>${cells.join("")}</tr>`;
        });
      document.getElementById("links-table").innerHTML = tableHtml("links", headers, htmlRows);
    }

    function tableHtml(view, headers, rows) {
      const state = sortState[view];
      const colgroup = `<colgroup>${headers.map(h => `<col${h.width ? ` style="width: ${escapeHtml(h.width)}"` : ""}>`).join("")}</colgroup>`;
      const head = `<thead><tr>${headers.map((h, i) => {
        const active = state.key === h.key;
        const mark = active ? `<span class="sort-mark">${state.direction === "asc" ? "▲" : "▼"}</span>` : "";
        const label = (h.lines || [h.label]).map(line => `<span class="head-line">${escapeHtml(line)}</span>`).join("");
        const link = h.url ? `<a class="contest-link" href="${escapeHtml(h.url)}" target="_blank" rel="noopener noreferrer">Open</a>` : "";
        return `<th class="${h.text ? "text" : ""}"><button type="button" data-sort-view="${view}" data-sort-key="${escapeHtml(h.key)}">${label}${mark}</button>${link}</th>`;
      }).join("")}</tr></thead>`;
      const body = rows.length ? rows.join("") : `<tr><td colspan="${headers.length}" class="text">No matching rows.</td></tr>`;
      return colgroup + head + `<tbody>${body}</tbody>`;
    }

    function matches(text) {
      return !query || text.toLowerCase().includes(query);
    }

    function render() {
      renderSummary();
      renderTeamTable();
      renderIndividualTable();
      renderRosterTable();
      renderLinksTable();
      document.getElementById("updated").textContent = "Last updated: " + new Date(DATA.generated_at).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
      document.getElementById("note").textContent = DATA.scoring_note;
    }

    document.getElementById("search").addEventListener("input", event => {
      query = event.target.value.trim().toLowerCase();
      render();
    });

    document.addEventListener("click", event => {
      const button = event.target.closest("[data-sort-view]");
      if (!button) return;
      const view = button.dataset.sortView;
      const key = button.dataset.sortKey;
      const state = sortState[view];
      if (state.key === key) {
        state.direction = state.direction === "asc" ? "desc" : "asc";
      } else {
        state.key = key;
        state.direction = key === "rank" || key === "team_name" || key === "codechef_handle" || key === "code" ? "asc" : "desc";
      }
      render();
    });

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        currentView = button.dataset.view;
        query = "";
        document.getElementById("search").value = "";
        document.querySelectorAll("[data-view]").forEach(b => b.setAttribute("aria-selected", String(b === button)));
        document.getElementById("team-view").classList.toggle("hidden", currentView !== "team");
        document.getElementById("individual-view").classList.toggle("hidden", currentView !== "individual");
        document.getElementById("roster-view").classList.toggle("hidden", currentView !== "roster");
        document.getElementById("links-view").classList.toggle("hidden", currentView !== "links");
      });
    });

    render();
  </script>
