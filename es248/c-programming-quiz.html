<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ES 248 — C Programming Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script>
    MathJax = {
      tex: { inlineMath: [['$','$']], processEscapes: true },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #eef2f7;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 780px; }

    /* ── Header ── */
    .q-header {
      background: linear-gradient(135deg, #1a365d 0%, #2a69ac 100%);
      color: white;
      padding: 1.25rem 2rem;
      border-radius: 16px 16px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .q-title { font-size: 1rem; font-weight: 700; letter-spacing: .01em; }
    .q-count { font-size: 0.85rem; opacity: .8; }

    /* ── Progress ── */
    .progress-track { height: 5px; background: #1a365d; }
    .progress-fill  { height: 100%; background: #48bb78; transition: width .45s ease; }

    /* ── Card ── */
    .q-card {
      background: #fff;
      border-radius: 0 0 16px 16px;
      padding: 2rem 2.25rem;
      box-shadow: 0 6px 28px rgba(0,0,0,.09);
    }

    /* ── Intro ── */
    .intro { text-align: center; padding: 2rem 0 1rem; }
    .intro-emoji { font-size: 3rem; margin-bottom: .75rem; }
    .intro h1 { font-size: 1.65rem; font-weight: 700; margin-bottom: .4rem; }
    .intro p  { color: #4a5568; line-height: 1.65; max-width: 500px; margin: 0 auto .9rem; }
    .intro-meta { color: #2b6cb0; font-weight: 600; font-size: .9rem; margin-bottom: 1.5rem; }

    .chips { display: flex; flex-wrap: wrap; gap: .45rem; justify-content: center; margin: 1rem 0 1.6rem; }
    .chip {
      background: #ebf8ff; color: #2b6cb0;
      padding: .25rem .75rem; border-radius: 20px;
      font-size: .75rem; font-weight: 500;
    }

    .btn {
      border: none; cursor: pointer; font-family: inherit; font-weight: 600;
      border-radius: 9px; transition: background .18s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #2b6cb0; color: #fff; padding: .75rem 2.25rem; font-size: 1rem; }
    .btn-primary:hover { background: #2c5282; }
    .btn-sm { background: #2b6cb0; color: #fff; padding: .6rem 1.6rem; font-size: .9rem; }
    .btn-sm:hover { background: #2c5282; }
    .btn-outline { background: #fff; color: #2b6cb0; border: 1.5px solid #bee3f8; padding: .6rem 1.6rem; font-size: .9rem; }
    .btn-outline:hover { background: #ebf8ff; }

    /* ── Question ── */
    .question-text {
      font-size: 1.05rem; font-weight: 500; line-height: 1.75;
      margin-bottom: 1.5rem; color: #1a202c;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: .7rem; }

    .option {
      display: flex; align-items: flex-start; gap: .75rem;
      padding: .85rem 1rem; border: 2px solid #e2e8f0;
      border-radius: 11px; cursor: pointer;
      transition: border-color .18s, background .18s;
      background: #fafafa;
    }
    .option:hover:not(.locked) { border-color: #4299e1; background: #ebf8ff; }
    .option.locked { cursor: default; }

    .opt-letter {
      font-weight: 700; font-size: .8rem; color: #4a5568;
      background: #edf2f7; border-radius: 50%;
      width: 28px; height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px; transition: background .18s, color .18s;
    }

    .option-body { flex: 1; }
    .opt-text { font-size: .93rem; line-height: 1.65; }

    .option.correct              { border-color: #48bb78; background: #f0fff4; }
    .option.correct .opt-letter  { background: #48bb78; color: #fff; }
    .option.wrong                { border-color: #fc8181; background: #fff5f5; }
    .option.wrong .opt-letter    { background: #fc8181; color: #fff; }

    .rationale {
      margin-top: .6rem; padding: .65rem .9rem;
      background: #f7fafc; border-left: 3px solid #cbd5e0;
      border-radius: 0 6px 6px 0;
      font-size: .84rem; line-height: 1.6; color: #4a5568;
    }
    .option.correct .rationale { border-left-color: #48bb78; background: #f0fff4; }
    .option.wrong   .rationale { border-left-color: #fc8181; background: #fff5f5; }

    /* ── Hint ── */
    .hint-row { margin-top: 1.2rem; }
    .hint-toggle {
      display: inline-flex; align-items: center; gap: .35rem;
      background: none; border: 1.5px solid #fbd38d; color: #975a16;
      padding: .35rem .9rem; border-radius: 20px; font-size: .82rem;
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: background .15s;
    }
    .hint-toggle:hover { background: #fffbeb; }
    .hint-box {
      margin-top: .55rem; padding: .7rem 1rem;
      background: #fffbeb; border: 1px solid #fbd38d;
      border-radius: 9px; font-size: .86rem; color: #744210;
      line-height: 1.6; display: none;
    }
    .hint-box.show { display: block; }

    /* ── Nav ── */
    .nav-row { margin-top: 1.6rem; display: flex; justify-content: flex-end; gap: .75rem; }
    .btn-next { display: none; }
    .btn-next.show { display: inline-block; }

    /* ── Score ── */
    .score-screen { text-align: center; padding: 2.5rem 0 1.5rem; }
    .score-ring {
      width: 130px; height: 130px; border-radius: 50%;
      background: linear-gradient(135deg, #1a365d, #2a69ac);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; color: white;
    }
    .score-num   { font-size: 2.75rem; font-weight: 700; line-height: 1; }
    .score-denom { font-size: .72rem; opacity: .75; }
    .score-grade { font-size: 1.5rem; font-weight: 700; margin-bottom: .35rem; }
    .score-sub   { color: #718096; margin-bottom: 1.75rem; font-size: .95rem; }

    .dot-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 1.75rem; }
    .dot {
      width: 22px; height: 22px; border-radius: 50%;
      font-size: .6rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .dot.ok  { background: #48bb78; }
    .dot.bad { background: #fc8181; }

    .score-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* ── Code ── */
    code {
      font-family: 'JetBrains Mono', monospace;
      background: #edf2f7; color: #c05621;
      padding: .15em .4em; border-radius: 4px; font-size: .87em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade { animation: fadeUp .22s ease; }

    @media (max-width: 600px) {
      body { padding: 0 0 3rem; }
      .q-header { border-radius: 0; }
      .q-card   { border-radius: 0; padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

      "answerOptions": [

<script>
const RAW    = JSON.parse(document.getElementById('qdata').textContent);
const QUIZ   = RAW.quiz;
const TOPICS = RAW.topics;
const ALPHA  = ['A','B','C','D'];

const S = { screen:'intro', idx:0, score:0, results:[], answered:false, selected:null };

function fmt(t) {
  return t.replace(/`([^`]+)`/g, '<code>$1</code>');
}

function typeset() {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([document.getElementById('app')]).catch(console.error);
  }
}

function render() {
  const app = document.getElementById('app');
  if      (S.screen === 'intro') app.innerHTML = buildIntro();
  else if (S.screen === 'quiz')  app.innerHTML = buildQuiz();
  else                           app.innerHTML = buildScore();
  typeset();
}

function buildIntro() {
  const chips = TOPICS.map(t => `<span class="chip">${t}</span>`).join('');
  return `
    <div class="q-header">
      <span class="q-title">ES 248 — C Programming</span>
      <span class="q-count">${QUIZ.length} Questions</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:0"></div></div>
    <div class="q-card">
      <div class="intro fade">
        <div class="intro-emoji">🧠</div>
        <h1>C Programming Quiz</h1>
        <p>Test your understanding of pointers, memory layout, arrays, strings, and core C concepts.</p>
        <div class="chips">${chips}</div>
        <div class="intro-meta">${QUIZ.length} questions &nbsp;·&nbsp; Multiple choice &nbsp;·&nbsp; Instant feedback</div>
        <button class="btn btn-primary" onclick="startQuiz()">Start Quiz →</button>
      </div>
    </div>`;
}

function buildQuiz() {
  const q   = QUIZ[S.idx];
  const pct = (S.idx / QUIZ.length * 100).toFixed(1);

  const opts = q.answerOptions.map((o, i) => {
    let cls = 'option';
    let rat = '';
    if (S.answered) {
      cls += ' locked';
      if (o.isCorrect)           { cls += ' correct'; rat = `<div class="rationale">${fmt(o.rationale)}</div>`; }
      else if (i === S.selected) { cls += ' wrong';   rat = `<div class="rationale">${fmt(o.rationale)}</div>`; }
    }
    const ev = S.answered ? '' : `onclick="pick(${i})"`;
    return `
      <div class="${cls}" ${ev}>
        <div class="opt-letter">${ALPHA[i]}</div>
        <div class="option-body">
          <div class="opt-text">${fmt(o.text)}</div>
          ${rat}
        </div>
      </div>`;
  }).join('');

  const isLast = S.idx === QUIZ.length - 1;
  return `
    <div class="q-header">
      <span class="q-title">ES 248 — C Programming</span>
      <span class="q-count">Q ${S.idx + 1} / ${QUIZ.length}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="fade">
        <div class="question-text">${fmt(q.question)}</div>
        <div class="options">${opts}</div>
        <div class="hint-row">
          <button class="hint-toggle" id="htog" onclick="toggleHint()">💡 Show hint</button>
          <div class="hint-box" id="hbox">${fmt(q.hint)}</div>
        </div>
        <div class="nav-row">
          <button class="btn btn-sm btn-next ${S.answered ? 'show' : ''}" onclick="next()">
            ${isLast ? 'See Results →' : 'Next →'}
          </button>
        </div>
      </div>
    </div>`;
}

function buildScore() {
  const pct = Math.round(S.score / QUIZ.length * 100);
  let grade, gc;
  if      (pct >= 85) { grade = '🎉 Excellent!';     gc = '#276749'; }
  else if (pct >= 65) { grade = '👍 Good job!';       gc = '#2b6cb0'; }
  else                { grade = '📚 Keep practising!'; gc = '#c05621'; }

  const dots = S.results.map((ok, i) =>
    `<div class="dot ${ok?'ok':'bad'}" title="Q${i+1}: ${ok?'correct':'wrong'}">${i+1}</div>`
  ).join('');

  return `
    <div class="q-header">
      <span class="q-title">ES 248 — C Programming</span>
      <span class="q-count">Results</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
    <div class="q-card">
      <div class="score-screen fade">
        <div class="score-ring">
          <div class="score-num">${S.score}</div>
          <div class="score-denom">out of ${QUIZ.length}</div>
        </div>
        <div class="score-grade" style="color:${gc}">${grade}</div>
        <div class="score-sub">You scored ${pct}% &nbsp;(${S.score} / ${QUIZ.length} correct)</div>
        <div class="dot-row">${dots}</div>
        <div class="score-btns">
          <button class="btn btn-sm btn-outline" onclick="goIntro()">← Home</button>
          <button class="btn btn-sm btn-primary" onclick="startQuiz()">Retake Quiz</button>
        </div>
      </div>
    </div>`;
}

function startQuiz() {
  Object.assign(S, { screen:'quiz', idx:0, score:0, results:[], answered:false, selected:null });
  render();
}

function goIntro() { S.screen = 'intro'; render(); }

function pick(i) {
  if (S.answered) return;
  S.answered = true;
  S.selected = i;
  const ok = QUIZ[S.idx].answerOptions[i].isCorrect;
  if (ok) S.score++;
  S.results.push(ok);
  render();
}

function next() {
  if (!S.answered) return;
  S.idx++;
  if (S.idx >= QUIZ.length) S.screen = 'score';
  S.answered = false;
  S.selected = null;
  render();
}

function toggleHint() {
  const box = document.getElementById('hbox');
  const btn = document.getElementById('htog');
  if (!box || !btn) return;
  const show = box.classList.toggle('show');
  btn.textContent = show ? '💡 Hide hint' : '💡 Show hint';
}

render();
</script>
